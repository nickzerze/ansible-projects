[defaults]
host_key_checking = False
# inventory = ./hosts

interpreter_python = /usr/bin/python3

# Αυτά είναι για το dynamic inventory plugin του AWS EC2.
# Λέμε επίσης ότι το remote_user είναι ο ec2-user και το private_key_file είναι το id_ed25519 που βρίσκεται στο .ssh directory.
# inventory = inventory_aws_ec2.yml
enable_plugins = aws_ec2
remote_user = ec2-user
private_key_file = ~/.ssh/id_ed25519